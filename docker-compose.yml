services:
  llama-api-qwen36:
    image: ${LMS_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    container_name: llama-api-qwen36
    restart: unless-stopped
    ports:
      - "${LMS_PORT_MODEL1:-${API_PORT_MODEL1:-1234}}:8080"
    volumes:
      - ${LMS_MODELS_ROOT_PRIMARY:-${PRIMARY_MODELS_ROOT:-/expert_scratch/lmstudio-models}}:/models_primary:ro
      - ${LMS_MODELS_ROOT_FALLBACK:-${FALLBACK_MODELS_ROOT:-/filer/users/rymax1e/lmstudio-models}}:/models_fallback:ro
    command:
      - -m
      - ${LMS_MODEL1_CONTAINER_PATH:-/models_primary/lmstudio-community/Qwen3.6-35B-A3B-GGUF/model.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --parallel
      - "${LMS_MAX_CONCURRENT:-${MAX_CONCURRENT:-4}}"
      - --threads
      - "${LMS_THREADS:-${THREADS:-16}}"
      - --ctx-size
      - "${LMS_CTX_SIZE:-${CTX_SIZE:-200000}}"
    mem_limit: ${LMS_CONTAINER_MAX_RAM:-${CONTAINER_MAX_RAM:-120g}}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  llama-api-qwen34:
    image: ${LMS_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    container_name: llama-api-qwen34
    restart: unless-stopped
    ports:
      - "${LMS_PORT_MODEL2:-${API_PORT_MODEL2:-1235}}:8080"
    volumes:
      - ${LMS_MODELS_ROOT_PRIMARY:-${PRIMARY_MODELS_ROOT:-/expert_scratch/lmstudio-models}}:/models_primary:ro
      - ${LMS_MODELS_ROOT_FALLBACK:-${FALLBACK_MODELS_ROOT:-/filer/users/rymax1e/lmstudio-models}}:/models_fallback:ro
    command:
      - -m
      - ${LMS_MODEL2_CONTAINER_PATH:-/models_primary/lmstudio-community/Qwen3-4B-Instruct-2507-GGUF/model.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --parallel
      - "${LMS_MAX_CONCURRENT:-${MAX_CONCURRENT:-4}}"
      - --threads
      - "${LMS_THREADS:-${THREADS:-16}}"
      - --ctx-size
      - "${LMS_CTX_SIZE:-${CTX_SIZE:-200000}}"
    mem_limit: ${LMS_CONTAINER_MAX_RAM:-${CONTAINER_MAX_RAM:-120g}}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
