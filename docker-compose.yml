services:
  lmstudio:
    build:
      context: .
      dockerfile: Dockerfile
    image: lmstudio-headless:latest
    container_name: lmstudio
    restart: unless-stopped
    ports:
      - "${LMS_PORT:-1234}:${LMS_PORT:-1234}"
    environment:
      - LMS_PORT=${LMS_PORT:-1234}
      - LMS_HOST=0.0.0.0
      - LMS_CONTEXT_LENGTH=${LMS_CONTEXT_LENGTH:-262144}
      - LMS_AUTOLOAD=${LMS_AUTOLOAD:-true}
      - LMS_MAX_CONCURRENT=${LMS_MAX_CONCURRENT:-10}
      - LMS_GET_MODEL=${LMS_GET_MODEL:-}
      # Space-separated list of model keys to autoload; see .env.example
      - LMS_MODELS=${LMS_MODELS:-}
    mem_swappiness: 0
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock: -1
    volumes:
      - /expert_scratch/lmstudio-models:/root/.lmstudio/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LMS_PORT:-1234}/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OPENAI_API_BASE_URL=http://lmstudio:${LMS_PORT:-1234}/v1
      - OPENAI_API_KEY=lmstudio
      - WEBUI_AUTH=true
      - ENABLE_LOGIN_FORM=true
      - ENABLE_SIGNUP=true
      - ENABLE_API_KEYS=true
      - ENABLE_EVALUATION_ARENA_MODELS=false
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      lmstudio:
        condition: service_healthy

volumes:
  open-webui-data:
    driver: local
